name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Decrypta.slnx

      - name: Build
        run: dotnet build Decrypta.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/Decrypta.Core.Tests/Decrypta.Core.Tests.csproj -c Release --no-build
