name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: |
          dotnet build Decrypta.slnx -c Release
          dotnet test tests/Decrypta.Core.Tests/Decrypta.Core.Tests.csproj -c Release --no-build

      - name: Publish self-contained
        shell: pwsh
        run: |
          # Publish the app, then the CLI separately, and copy only the CLI's own two files
          # in (publishing both to one folder would clobber the app's assets).
          dotnet publish src/Decrypta.App/Decrypta.App.csproj -c Release -r win-x64 --self-contained true -o publish
          dotnet publish src/Decrypta.Cli/Decrypta.Cli.csproj -c Release -r win-x64 --self-contained true -o publish_cli
          Copy-Item publish_cli/decrypta-cli.exe, publish_cli/decrypta-cli.dll publish/
          Remove-Item -Recurse -Force publish_cli

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\Decrypta.iss

      - name: Checksums (SHA256SUMS.txt for auto-update verification)
        shell: pwsh
        run: |
          $f = Get-ChildItem release\*.exe | Select-Object -First 1
          $h = (Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLower()
          # "<hash> <filename>" — matches the format the in-app updater parses.
          "$h $($f.Name)" | Out-File -Encoding ascii release\SHA256SUMS.txt
          Get-Content release\SHA256SUMS.txt

      - name: Release notes from CHANGELOG
        shell: pwsh
        run: |
          # Pull just this version's section out of CHANGELOG.md so the release page shows
          # readable notes (not a bare "Full Changelog" diff link).
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $out = @(); $inSection = $false
          foreach ($line in Get-Content CHANGELOG.md) {
            if ($line -match '^##\s+\[') {
              if ($line -match "\[$([regex]::Escape($ver))\]") { $inSection = $true; continue }
              elseif ($inSection) { break }
            }
            if ($inSection) { $out += $line }
          }
          $notes = ($out -join "`n").Trim()
          if ([string]::IsNullOrWhiteSpace($notes)) { $notes = "Decrypta $ver" }
          $notes | Out-File -Encoding utf8 RELEASE_NOTES.md
          Write-Output $notes

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/SHA256SUMS.txt
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
